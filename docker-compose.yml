services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: docweaver
      POSTGRES_USER: docweaver
      POSTGRES_PASSWORD: docweaver
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docweaver -d docweaver"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./docweaver-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docweaver
      SPRING_DATASOURCE_USERNAME: docweaver
      SPRING_DATASOURCE_PASSWORD: docweaver
      APP_STORAGE_UPLOADS_DIR: /app/data/uploads
      APP_STORAGE_OUTPUT_DIR: /app/data/output
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/output:/app/data/output
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./docweaver-ui
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes: {}
